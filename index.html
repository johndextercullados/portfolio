            </div>

            <!-- NAME, QUOTE, SOCIAL BUTTONS -->
            <div class="col-lg-7 col-12 text-center text-lg-start">

                <h1 class="display-4 mb-0" style="color: #ffffff; font-family: 'Montserrat', sans-serif;">

    <!-- VANTA JS FOR BACKGROUND -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <script>
        VANTA.NET({
            el: "#vanta-canvas",        // target to css
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0xb39aa0,            /* lines color */
            backgroundColor: 0x23153c   /* bg color */
        })
    </script>

    <!-- JS FOR THE ANIMATIONS -->
